<!-- App bar -->
<div id="appBarRoot"></div>

<!-- ──────────── WORKSPACE (sidebar + sheet) ──────────── -->
<div class="workspace">

<!-- LEFT: Intake sidebar -->
<div id="intakeSidebarRoot"></div>

<!-- RIGHT: Call sheet -->
<div class="sheet-main">
<div class="page-wrap" id="pagesRoot"></div>
</div>

</div><!-- end .workspace -->

<!-- Tweaks panel -->
<div id="tweaksPanelRoot"></div>
